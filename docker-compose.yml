services:
  db:
    image: postgis/postgis:16-3.4
    # Image PostGIS officielle basée sur PostgreSQL 16
    # Inclut toutes les extensions spatiales nécessaires
    container_name: Analyse-des-delais-de-traitement-par-quartier
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: services
    ports:
      - "5438:5432"
      # Port 5437 sur ta machine pour éviter les conflits
    volumes:
      - services_data:/var/lib/postgresql/data
      - ./data/:/data
      - ./initdb:/docker-entrypoint-initdb.d

volumes:
  services_data:
